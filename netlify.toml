[build]
  base = "artifacts/wasteland-zero"
  command = "cd ../.. && pnpm install && pnpm --filter @workspace/wasteland-zero run build"
  publish = "dist/public"

[build.environment]
  NODE_VERSION = "24"
  NPM_FLAGS = "--prefix=/dev/null"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
